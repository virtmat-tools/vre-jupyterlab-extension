name: Extension Publish

on:
  push:
    tags:
      - 'vre-jupyterlab-extension-v*'
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional: tag to create and push (e.g. vre-jupyterlab-extension-v0.1.1)'
        required: false
        default: ''

permissions:
  contents: read

jobs:

  create-tag:
    runs-on: ubuntu-latest
    # run only for manual dispatch and when user provided a tag
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create and push tag
        env:
          GITHUB_TOKEN: ${{ secrets.THE_GITHUB_PACKAGES_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ github.event.inputs.release_tag }}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "${{ github.event.inputs.release_tag }}"

  build-dist:
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '') }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0

      - name: Setup Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Build Tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'jupyterlab>=4.2,<5' build twine

      - name: Install JS Dependencies
        run: npm ci

      - name: Build JupyterLab Extension Assets
        run: npm run build

      - name: Verify Python
        run: |
          which python
          python --version

      - name: Build Python Distribution
        run: python -m build

      - name: Check Distribution
        run: twine check dist/*

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4.4.0
        with:
          name: vre-jupyterlab-extension-dist
          path: dist/*

  publish-pypi:
    needs: build-dist
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: vre-jupyterlab-extension-dist
          path: dist

      - name: Publish To PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-github-packages:
    needs: build-dist
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: '3.12'

      - name: Install Twine
        run: python -m pip install --upgrade pip twine

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          name: vre-jupyterlab-extension-dist
          path: dist

      - name: Publish To GitHub Packages
        env:
          THE_GITHUB_PACKAGES_TOKEN: ${{ secrets.THE_GITHUB_PACKAGES_TOKEN }}
        run: |
          twine upload \
            --non-interactive \
            --repository-url https://pypi.pkg.github.com/${{ github.repository }}/ \
            --username __token__ \
            --password "${THE_GITHUB_PACKAGES_TOKEN}" \
            dist/*