name: VRE JupyterLab Extension Test Suite

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/extension-pr-ci.yml'
  push:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/extension-pr-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  extension-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0

      - name: Setup Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install JupyterLab (jlpm)
        run: jlpm install

      - name: Setup Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: 3.11
          cache: pip
          cache-dependency-path: packages/vre-jupyterlab-extension/pyproject.toml

      - name: Verify Python
        run: |
          which python
          python --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyterlab

      - name: Build Extension
        run: |
          npm run ci:build

      - name: Run Basic Tests
        if: always()
        run: npm run ci:test

      - name: Generate CI Summary
        if: always()
        run: npm run ci:summary

      - name: Publish Job Summary
        if: always()
        run: |
          if [ -f tests/ci-summary.md ]; then
            cat tests/ci-summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment PR with Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7.1.0
        with:
          script: |
            const fs = require('node:fs');
            const summaryPath = 'tests/ci-summary.md';
            
            if (!fs.existsSync(summaryPath)) {
              console.log('No summary file found');
              return;
            }
            
            const summary = fs.readFileSync(summaryPath, 'utf8');
            
            // Get existing comments from bot
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('Extension Test Result')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary,
              });
            }

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: test-results-node${{ matrix.node-version }}
          path: |
            tests/test-results.tap
            tests/ci-summary.json
            tests/ci-summary.md