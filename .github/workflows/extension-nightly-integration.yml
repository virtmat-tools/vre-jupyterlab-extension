name: Extension Nightly Integration

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-integration:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24, 25]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0

      - name: Setup Node
        uses: actions/setup-node@v4.1.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyterlab

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5.1.0
        with:
          python-version: 3.11
          cache: pip
          cache-dependency-path: packages/vre-jupyterlab-extension/pyproject.toml

      - name: Ensure correct Python is used
        run: |
          which python
          python --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyterlab

      - name: Build Extension
        run: |
          npm run build

      - name: Run Tests
        if: always()
        run: npm test 2>&1 | tee tests/test-results.tap

      - name: Publish Job Summary
        if: always()
        uses: actions/github-script@v7.1.0
        with:
          script: |
            const fs = require('node:fs');
            const tapPath = 'tests/test-results.tap';
            const tap = fs.existsSync(tapPath) ? fs.readFileSync(tapPath, 'utf8') : '';
            const lines = tap.split(/\r?\n/);
            const passed = [];
            const failed = [];

            for (const line of lines) {
              if (line.startsWith('ok ')) {
                passed.push(line.replace(/^ok\s+\d+\s*-\s*/, '').trim());
              } else if (line.startsWith('not ok ')) {
                failed.push(line.replace(/^not ok\s+\d+\s*-\s*/, '').trim());
              }
            }

            const summary = [
              '## Extension CI Summary',
              '',
              '| Metric | Value |',
              '|---|---:|',
              `| Total tests | ${passed.length + failed.length} |`,
              `| Passed | ${passed.length} |`,
              `| Failed | ${failed.length} |`,
              '',
            ];

            if (failed.length > 0) {
              summary.push('### Failed Tests', '');
              for (const name of failed) {
                summary.push(`- ${name}`);
              }
              summary.push('');
            }

            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${summary.join('\n')}\n`);

      - name: Upload Nightly Artifact
        if: always()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: extension-nightly-artifacts
          path: tests/test-results.tap
          if-no-files-found: warn